<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SAKURA RUSH 2026 — 封底</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 210mm; height: 297mm; overflow: hidden; background: #1a0a12; font-family: 'Inter', sans-serif; }
  .page { width: 210mm; height: 297mm; position: relative; overflow: hidden; }
  .playfair { font-family: 'Playfair Display', serif; }
  .noto-serif { font-family: 'Noto Serif SC', serif; }

  /* 背景图 */
  .back-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1546436836-07a91091f160?w=1200&q=90');
    background-size: cover;
    background-position: center;
  }

  /* 深色渐变叠加 */
  .back-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(20, 5, 12, 0.65) 0%,
      rgba(20, 5, 12, 0.40) 30%,
      rgba(20, 5, 12, 0.55) 65%,
      rgba(20, 5, 12, 0.92) 100%
    );
  }

  /* 顶部细彩条 */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #f7931e, #ec407a, #a855f7, #ec407a, #f7931e);
    z-index: 10;
  }

  /* 底部细彩条 */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #f7931e, #ec407a, #a855f7, #ec407a, #f7931e);
    z-index: 10;
  }

  /* 主内容区 */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    padding: 40px;
  }

  /* 大标语 */
  .main-phrase {
    font-size: 52px;
    line-height: 1.1;
    color: #ffffff;
    text-align: center;
    text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  /* 日文副标 */
  .jp-phrase {
    font-size: 22px;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.75);
    margin-bottom: 36px;
    text-shadow: 0 2px 15px rgba(0,0,0,0.4);
  }

  /* 分隔装饰 */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
  }
  .divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(247,147,30,0.7));
  }
  .divider-line.right { background: linear-gradient(90deg, rgba(247,147,30,0.7), transparent); }

  /* 品牌信息框 */
  .brand-box {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(247,147,30,0.25);
    border-radius: 12px;
    padding: 24px 40px;
    text-align: center;
    max-width: 380px;
    width: 100%;
  }

  /* 水印 */
  .watermark {
    position: absolute;
    top: 50%;
    right: 20px;
    font-size: 7.5px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.12);
    writing-mode: vertical-rl;
    transform: translateY(-50%);
    z-index: 8;
  }

  /* 页码 */
  .page-num {
    position: absolute;
    bottom: 16px;
    left: 24px;
    font-size: 8px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.12em;
    z-index: 8;
  }

  /* 装饰樱花 */
  .deco-sakura {
    position: absolute;
    font-size: 22px;
    opacity: 0.3;
  }

  /* 底部版权 */
  .copyright {
    position: absolute;
    bottom: 16px;
    right: 24px;
    font-size: 8px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    z-index: 8;
  }

  /* 角落装饰框 */
  .corner-tl { position: absolute; top: 14px; left: 14px; width: 40px; height: 40px; border-top: 1.5px solid rgba(247,147,30,0.4); border-left: 1.5px solid rgba(247,147,30,0.4); z-index:8; }
  .corner-tr { position: absolute; top: 14px; right: 14px; width: 40px; height: 40px; border-top: 1.5px solid rgba(247,147,30,0.4); border-right: 1.5px solid rgba(247,147,30,0.4); z-index:8; }
  .corner-bl { position: absolute; bottom: 14px; left: 14px; width: 40px; height: 40px; border-bottom: 1.5px solid rgba(247,147,30,0.4); border-left: 1.5px solid rgba(247,147,30,0.4); z-index:8; }
  .corner-br { position: absolute; bottom: 14px; right: 14px; width: 40px; height: 40px; border-bottom: 1.5px solid rgba(247,147,30,0.4); border-right: 1.5px solid rgba(247,147,30,0.4); z-index:8; }
</style>
</head>
<body>

      <div style="display:flex;justify-content:center;gap:20px;">
        <div style="text-align:center;">
