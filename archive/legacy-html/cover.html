<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKURA RUSH 2026 — 封面</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 210mm;
    height: 297mm;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .page {
    width: 210mm;
    height: 297mm;
    position: relative;
    overflow: hidden;
  }
  .playfair { font-family: 'Playfair Display', serif; }
  .noto-serif { font-family: 'Noto Serif SC', serif; }

  /* 顶部渐变装饰条 */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #f7931e, #ec407a, #f7931e);
    z-index: 10;
  }

  /* 封面背景 */
  .cover-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?w=1200&q=90');
    background-size: cover;
    background-position: center 40%;
  }

  /* 叠加层 */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(10, 5, 15, 0.45) 0%,
      rgba(10, 5, 15, 0.25) 30%,
      rgba(10, 5, 15, 0.55) 70%,
      rgba(10, 5, 15, 0.85) 100%
    );
  }

  /* 主标题 */
  .main-title {
    font-size: 88px;
    line-height: 1;
    letter-spacing: 0.08em;
    color: #ffffff;
    text-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  /* 副标题 */
  .sub-title {
    font-size: 22px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 2px 15px rgba(0,0,0,0.4);
  }

  /* 分隔线 */
  .divider-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #f7c59f, #ec407a, #f7c59f, transparent);
    margin: 0 auto;
  }

  /* 徽章框 */
  .badge-ring {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
  }

  /* 底部信息条 */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(10, 5, 15, 0.75);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(247,147,30,0.35);
    padding: 14px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* 樱花装饰 */
  .sakura-petal {
    position: absolute;
    font-size: 18px;
    opacity: 0.55;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-30px) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(300mm) rotate(360deg); opacity: 0; }
  }

  /* 品牌标识 */
  .brand-logo {
    position: absolute;
    top: 20px;
    right: 24px;
    z-index: 20;
  }

  /* 水印 */
  .watermark {
    position: absolute;
    bottom: 68px;
    right: 20px;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
    writing-mode: vertical-rl;
    font-family: 'Inter', sans-serif;
    z-index: 10;
  }

  /* 页码 */
  .page-num {
    position: absolute;
    bottom: 72px;
    left: 22px;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em;
    font-family: 'Inter', sans-serif;
    z-index: 10;
  }

  .luxury-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid rgba(247,147,30,0.6);
    padding: 4px 14px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(247,195,130,1);
    font-family: 'Inter', sans-serif;
  }
</style>
</head>
<body>
<div class="page">
  <!-- 顶部彩条 -->
  <div class="top-bar"></div>

  <!-- 背景图 -->
  <div class="cover-bg"></div>

  <!-- 叠加层 -->
  <div class="overlay"></div>

  <!-- 樱花飘落装饰 -->
  <span class="sakura-petal" style="left:8%;animation-duration:12s;animation-delay:-3s;top:-10px;">🌸</span>
  <span class="sakura-petal" style="left:22%;animation-duration:15s;animation-delay:-7s;top:-10px;">🌸</span>
  <span class="sakura-petal" style="left:38%;animation-duration:10s;animation-delay:-2s;top:-10px;">🌸</span>
  <span class="sakura-petal" style="left:65%;animation-duration:14s;animation-delay:-9s;top:-10px;">🌸</span>
  <span class="sakura-petal" style="left:82%;animation-duration:11s;animation-delay:-5s;top:-10px;">🌸</span>

  <!-- 品牌标识 -->
  <div class="brand-logo">
    <div class="luxury-tag">
      <span>✦</span>
      <span>SAKURA RUSH</span>
      <span>✦</span>
    </div>
  </div>

  <!-- 主体内容区 -->
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;padding-top:20px;">

    <!-- 日文小标 -->
    <div class="noto-serif" style="font-size:13px;letter-spacing:0.4em;color:rgba(255,255,255,0.6);margin-bottom:28px;">
      東京都 · 2026年春
    </div>

    <!-- 分隔装饰 -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="width:50px;height:1px;background:linear-gradient(90deg,transparent,rgba(247,147,30,0.8));"></div>
      <span style="color:rgba(236,64,122,0.9);font-size:16px;">❀</span>
      <div style="width:50px;height:1px;background:linear-gradient(90deg,rgba(247,147,30,0.8),transparent);"></div>
    </div>

    <!-- 主标题 -->
    <h1 class="playfair main-title" style="text-align:center;margin-bottom:8px;">
      東京 · 桜
    </h1>

    <!-- 小装饰线 -->
    <div class="divider-line" style="margin-bottom:28px;margin-top:10px;width:120px;"></div>

    <!-- 副标题 -->
    <h2 class="noto-serif sub-title" style="text-align:center;margin-bottom:36px;">
      2026 樱花季 · 7日深度行程
    </h2>

    <!-- 三个徽章 -->
    <div style="display:flex;gap:30px;align-items:center;margin-bottom:40px;">
      <div class="badge-ring">
        <div class="noto-serif" style="font-size:20px;color:#fff;font-weight:600;">7</div>
        <div style="font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.65);margin-top:3px;">天行程</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;letter-spacing:0.3em;color:rgba(247,195,130,0.9);margin-bottom:8px;">MARCH – APRIL 2026</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.2em;">FULL ITINERARY</div>
      </div>
      <div class="badge-ring">
        <div style="font-size:22px;">🌸</div>
        <div style="font-size:9px;letter-spacing:0.1em;color:rgba(255,255,255,0.65);margin-top:3px;">满开季</div>
      </div>
    </div>

    <!-- 标签 -->
    <div style="display:flex;gap:12px;">
      <span style="border:1px solid rgba(255,255,255,0.2);padding:4px 14px;font-size:10px;letter-spacing:0.15em;color:rgba(255,255,255,0.55);font-family:'Inter',sans-serif;">专属定制</span>
      <span style="border:1px solid rgba(236,64,122,0.4);padding:4px 14px;font-size:10px;letter-spacing:0.15em;color:rgba(236,130,162,0.9);font-family:'Inter',sans-serif;">PREMIUM EDITION</span>
      <span style="border:1px solid rgba(255,255,255,0.2);padding:4px 14px;font-size:10px;letter-spacing:0.15em;color:rgba(255,255,255,0.55);font-family:'Inter',sans-serif;">HIGH END</span>
    </div>
  </div>

  <!-- 水印 -->
  <div class="watermark">SAKURA RUSH 2026 · CONFIDENTIAL</div>
  <div class="page-num">— 01 —</div>

  <!-- 底部信息条 -->
  <div class="bottom-bar">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="color:rgba(247,147,30,0.9);font-size:14px;">✦</span>
      <span class="noto-serif" style="font-size:12px;color:rgba(255,255,255,0.8);letter-spacing:0.12em;">定制专属 · 仅此一份</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div style="width:4px;height:4px;border-radius:50%;background:rgba(236,64,122,0.7);"></div>
      <span style="font-size:10px;letter-spacing:0.2em;color:rgba(255,255,255,0.55);font-family:'Inter',sans-serif;">MARCH 2026</span>
      <div style="width:4px;height:4px;border-radius:50%;background:rgba(236,64,122,0.7);"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="noto-serif" style="font-size:12px;color:rgba(255,255,255,0.8);letter-spacing:0.12em;">全程深度体验</span>
      <span style="color:rgba(247,147,30,0.9);font-size:14px;">✦</span>
    </div>
  </div>
</div>
</body>
</html>
