schema: spec-driven

context: |
  AI 旅行手账生成系统
  产品: 纸质旅行手账本 + 贴纸DIY包，国内298/国外348元
  用户: 中国20-40岁出境游客，抖音表单采集为主入口
  覆盖: 六城市圈（关西、关东、北海道、广府、北疆、广东）

  技术栈:
    - 后端: Python FastAPI (async) + PostgreSQL + Redis
    - 前端: Next.js 14 (TypeScript)
    - 任务队列: arq
    - AI: Claude Opus/Sonnet (Anthropic) + qwen-max (阿里云, 高并发)
    - PDF渲染: WeasyPrint
    - 搜索: PostgreSQL pgvector

  核心架构:
    表单输入 -> 归一化 -> 16步行程规划管线 -> 页面生成 -> PDF渲染 -> 交付

  数据底座: 真实数据源驱动(Tabelog/携程/Google Maps/japan-guide)
  AI角色: 判断+文案，不作为数据源
  详见: docs/SYSTEM_DESIGN_V2.md + docs/pipeline/README.md

rules:
  proposal:
    - 必须说明该模块在手账本交付链中的位置
    - 必须标注 MVP 优先级
  tasks:
    - 每个任务不超过 4 小时
    - 标注依赖关系
