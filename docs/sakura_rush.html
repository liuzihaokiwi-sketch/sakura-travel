<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>日本樱花实时花期 2026</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:#fdfaf7;color:#333}

/* === HEADER === */
.hdr{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid #f0e8e0;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr h1{font-size:15px;color:#c0392b;white-space:nowrap}
.hdr .badge{font-size:8px;color:#999;background:#f8f4f0;padding:2px 8px;border-radius:10px}

/* View toggle */
.hdr-toggle{display:flex;background:#f5f0eb;border-radius:6px;overflow:hidden}
.ht-btn{padding:5px 14px;font-size:11px;font-weight:600;color:#888;cursor:pointer;transition:.15s}
.ht-btn.active{color:#fff;background:linear-gradient(135deg,#e91e63,#c2185b);border-radius:6px}

/* City tabs */
.hdr-cities{display:flex;gap:2px}
.hc-btn{padding:4px 10px;font-size:11px;font-weight:600;color:#888;cursor:pointer;border-radius:6px;transition:.15s;white-space:nowrap}
.hc-btn.active{color:#c0392b;background:#fdf5f5}

/* === LAYOUT === */
.app{display:flex;flex-direction:column;height:100vh}
.page{flex:1;display:none;overflow:hidden}
.page.active{display:flex}

/* === MAP PAGE === */
#map-page{display:flex}
/* Left panel - hot list */
.lp{width:220px;flex-shrink:0;border-right:1px solid #f0e8e0;display:flex;flex-direction:column;background:#fff}
.lp-hdr{padding:8px 10px;font-size:12px;font-weight:700;border-bottom:1px solid #f5f0eb;display:flex;align-items:center;gap:4px;flex-shrink:0}
.lp-hdr .lph-emoji{font-size:16px}
.lp-hdr .lph-status{font-size:9px;color:#e91e63;font-weight:600;margin-left:auto}
.lp-list{flex:1;overflow-y:auto}
.lp-list::-webkit-scrollbar{width:2px}
.lp-list::-webkit-scrollbar-thumb{background:#e0d8d0;border-radius:2px}

.lp-item{padding:7px 10px;border-bottom:1px solid #faf6f2;cursor:pointer;transition:.12s;border-left:3px solid transparent}
.lp-item:hover{background:#fef9f9}
.lp-item.active{background:#fdf5f5;border-left-color:#e91e63}
.lp-rank{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;text-align:center;line-height:18px;color:#fff;margin-right:4px;vertical-align:middle}
.lp-rank.r1{background:linear-gradient(135deg,#f7971e,#ffd200)}
.lp-rank.r2{background:linear-gradient(135deg,#bdc3c7,#95a5a6)}
.lp-rank.r3{background:linear-gradient(135deg,#cd7f32,#d4a76a)}
.lp-rank.rn{background:#e0d8d0;color:#888}
.lp-name{font-size:11px;font-weight:600;display:inline;vertical-align:middle}
.lp-sub{font-size:9px;color:#999;margin-top:1px;margin-left:22px}
.lp-sub b{color:#c0392b}
.lp-mini{height:3px;background:#f0ebe5;border-radius:2px;margin:3px 0 0 22px;position:relative}
.lp-mini .mf{height:100%;border-radius:2px;position:absolute}
.mbm{background:linear-gradient(90deg,#f8b4c8,#f48fb1)}
.mbb{background:linear-gradient(90deg,#e91e63,#c2185b)}
.mbf{background:linear-gradient(90deg,#ce93d8,#ab47bc)}
.lp-mini .td{position:absolute;top:-1px;width:1.5px;height:5px;background:#333;border-radius:1px}

/* Center - map */
.center{flex:1;position:relative}
#lmap{width:100%;height:100%}

/* Leaflet label tooltip override */
.spot-label{background:rgba(255,255,255,.92)!important;border:1px solid #f0d0d0!important;border-radius:6px!important;padding:3px 6px!important;font-family:-apple-system,'PingFang SC',sans-serif!important;box-shadow:0 1px 4px rgba(0,0,0,.08)!important;pointer-events:auto!important}
.spot-label .sl-name{font-size:9px;font-weight:700;color:#333}
.spot-label .sl-date{font-size:8px;color:#c0392b;font-weight:600}
.spot-label .sl-score{font-size:8px;color:#fff;background:#e91e63;border-radius:3px;padding:0 3px;display:inline-block;margin-left:2px}

/* Landmark icons */
.lmk-icon{background:none!important;border:none!important;box-shadow:none!important}
.lmk-inner{text-align:center;line-height:1.1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.lmk-inner .lmk-emoji{font-size:22px;display:block}
.lmk-inner .lmk-name{font-size:8px;font-weight:700;color:#555;background:rgba(255,255,255,.85);border-radius:3px;padding:0 3px;display:inline-block;margin-top:1px;white-space:nowrap}

/* Right panel - detail */
.rp{width:300px;flex-shrink:0;border-left:1px solid #f0e8e0;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.rp::-webkit-scrollbar{width:2px}
.rp::-webkit-scrollbar-thumb{background:#e0d8d0;border-radius:2px}
.rp-empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:#ccc;font-size:13px;padding:20px;line-height:2}

/* Detail card */
.dc{display:none}
.dc.visible{display:block}
.dc-img{width:100%;height:170px;object-fit:cover;display:block}
.dc-img-ph{width:100%;height:100px;background:linear-gradient(135deg,#fce4ec,#f8bbd0);display:flex;align-items:center;justify-content:center;font-size:36px}
.dc-body{padding:12px 14px 20px}
.dc-name{font-size:17px;font-weight:700}
.dc-addr{font-size:10px;color:#999;margin-top:2px}
.dc-score-box{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:#fdf5f5;border-radius:8px}
.dc-score-num{font-size:26px;font-weight:900;color:#c0392b}
.dc-score-label{font-size:11px;font-weight:600;color:#c0392b}
.dc-score-reason{font-size:9px;color:#999;margin-top:1px}
.dc-dates{margin-top:10px}
.dc-dr{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #faf6f2}
.dc-dr:last-child{border-bottom:none}
.dc-dr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dc-dr-label{font-size:10px;color:#666;width:40px}
.dc-dr-val{font-size:12px;font-weight:700;flex:1}
.dc-dr-days{font-size:9px;color:#aaa}
.dc-bar{height:8px;background:#f0ebe5;border-radius:4px;margin-top:8px;position:relative}
.dc-bar .bf{height:100%;border-radius:4px;position:absolute}
.dc-bar .td{position:absolute;top:-2px;width:2px;height:12px;background:#333;border-radius:1px;z-index:2}
.dc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.dct{font-size:9px;padding:2px 7px;border-radius:5px}
.dct-night{background:#f3e5f5;color:#8e24aa}
.dct-meisyo{background:#fff3e0;color:#e65100}
.dct-trees{background:#e8f5e9;color:#2e7d32}
.dct-namiki{background:#e3f2fd;color:#1565c0}
.dc-desc{margin-top:10px;font-size:11px;color:#555;line-height:1.6}
.dc-event{margin-top:8px;padding:7px 10px;background:#fdf5f5;border-radius:8px;font-size:10px;color:#c0392b}
.dc-event b{display:block;margin-bottom:2px}

/* === TIMELINE PAGE — Full screen card style === */
#tl-page{flex-direction:column;overflow-y:auto;background:#faf7f4}
#tl-page::-webkit-scrollbar{width:4px}
#tl-page::-webkit-scrollbar-thumb{background:#e0d8d0;border-radius:2px}
.tl-wrap{max-width:1200px;margin:0 auto;padding:12px 20px 40px;width:100%}
.tl-legend{display:flex;justify-content:center;gap:14px;margin:6px 0 12px;font-size:10px;color:#888}
.tl-legend .tli{display:flex;align-items:center;gap:3px}
.tl-legend .tlb{width:18px;height:5px;border-radius:3px}

/* Region group header */
.tl-region{margin-bottom:24px}
.tl-region-hdr{font-size:14px;font-weight:800;color:#880e4f;padding:8px 14px;background:linear-gradient(90deg,#fce4ec,transparent);border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tl-region-hdr .trh-count{font-size:10px;color:#ad1457;font-weight:600;margin-left:auto}

/* Card grid */
.tl-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.tl-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #f0e8e0;transition:.2s;cursor:pointer;display:flex;flex-direction:column}
.tl-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.tl-card-top{display:flex;gap:0}
.tl-card-img{width:120px;height:110px;object-fit:cover;flex-shrink:0;background:#fce4ec}
.tl-card-img-ph{width:120px;height:110px;flex-shrink:0;background:linear-gradient(135deg,#fce4ec,#f8bbd0);display:flex;align-items:center;justify-content:center;font-size:28px}
.tl-card-info{flex:1;padding:10px 12px;min-width:0;display:flex;flex-direction:column}
.tl-card-name{font-size:14px;font-weight:800;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-card-meta{font-size:10px;color:#999;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.tl-card-score{display:inline-flex;align-items:center;gap:2px;background:#e91e63;color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:6px;flex-shrink:0}
.tl-card-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.tl-card-tags span{font-size:8px;padding:1px 5px;border-radius:4px}
.tl-card-dates{display:flex;gap:4px;margin-top:auto;font-size:9px;flex-wrap:wrap}
.tl-card-dates .tcd{display:flex;align-items:center;gap:2px}
.tl-card-dates .tcd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-card-bottom{padding:6px 12px 10px}
.tl-card-bar{height:10px;background:#f5f0eb;border-radius:5px;position:relative;overflow:hidden}
.tl-card-bar .bf{height:100%;border-radius:5px;position:absolute}
.tl-card-bar .td{position:absolute;top:-2px;width:2px;height:14px;background:#333;border-radius:1px;z-index:2}
.tl-card-desc{font-size:10px;color:#666;line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* City selector in TL */
.tl-city-nav{display:flex;justify-content:center;gap:6px;margin-bottom:12px;position:sticky;top:0;background:#faf7f4;padding:8px 0;z-index:10}
.tl-cn-btn{padding:6px 16px;font-size:12px;font-weight:700;color:#888;cursor:pointer;border-radius:8px;transition:.15s;border:1px solid #e0d8d0;background:#fff}
.tl-cn-btn.active{color:#fff;background:linear-gradient(135deg,#e91e63,#c2185b);border-color:#e91e63}
.tl-cn-btn:hover{border-color:#f48fb1}

.footer{text-align:center;padding:8px;font-size:8px;color:#ccc;flex-shrink:0}

@media(max-width:800px){
  .lp{width:170px}
  .rp{width:240px}
}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-left">
    <h1>🌸 日本樱花花期 2026</h1>

</div>

<!-- MAP PAGE -->
<div class="page active" id="map-page">

</div>

<!-- TIMELINE PAGE -->
<div class="page" id="tl-page">

</div>

<div class="footer">数据: Weathernews实地取材 + 气象厅实测 + 200万用户报告 | 2026/3/20</div>
</div>

var RAW={"tokyo":[{"id":"4417","name":"六義園","lat":35.7324,"lon":139.7484,"full":"3月22日","fall":"3月27日","trees":"約20本","lightup":true,"desc":"高さ約15m・幅約20mのしだれ桜は、ソメイヨシノよりもひと足早く見頃を迎えます。薄紅色の花が滝のように咲く姿は圧巻です。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-03-31/82451196.jpg","namiki":true,"score":90,"region":"上野·文京","desc_cn":"柳�的的六义园以一棵15米高的巨大枝垂樱闻名，比染井吉野早开一周。夜间灯光下枝垂樱如粉色瀑布倾泻而下，是东京最美夜樱之一。"},{"id":"4403","name":"妙法寺","lat":35.6319,"lon":139.6067,"half":"3月22日","full":"3月23日","fall":"3月30日","trees":"10本","lightup":true,"desc":"ピンクのシダレザクラと白のオオシマザクラ、そしてコブシの白が大変美しいです。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-04-02/82528064.jpg","namiki":true,"score":63,"region":"都心·其他"},{"id":"4485","name":"小石川後楽園(シダレザクラ)","lat":35.7051,"lon":139.7486,"full":"3月22日","fall":"3月29日","trees":"5本","lightup":true,"desc":"水戸徳川家ゆかりの小石川後楽園の春を彩るシダレザクラは、ソメイヨシノより1週間程早く薄紅色の花を咲かせます。シダレザクラは、西門から入ってすぐの場所にあります。酒類の持込み、敷物を敷くことはできません。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2025-03-27/95452814.jpg","namiki":true,"score":83,"region":"上野·文京","desc_cn":"水户德川家的名园，枝垂樱比染井吉野早开约一周。日式庭园+枝垂樱的组合非常有日本传统美感。禁止野餐，适合安静欣赏。"},{"id":"106","name":"上野恩賜公園","lat":35.7148,"lon":139.7731,"half":"3月24日","full":"3月26日","fall":"4月1日","trees":"約800本","lightup":true,"desc":"桜の本数約800本。江戸初期からの桜の名所です。「秋色桜」とよばれる清水観音堂内のシダレザクラが有名です。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-04-08/82748630.jpg","meisyo100":true,"namiki":true,"score":97,"region":"上野·文京","desc_cn":"东京最经典的赏樱圣地，约800棵樱花树沿不忍池畔盛放。自江户时代就是赏樱名所，每年超300万人到访。名所百选级别，夜间灯光下的樱花隧道美不胜收。"},{"id":"108","name":"井の頭恩賜公園","lat":35.7004,"lon":139.5743,"half":"3月25日","full":"3月26日","fall":"4月1日","trees":"約400本","lightup":true,"desc":"公園全体で約400本、そのうち井の頭池周辺に約200本の桜があります。池にせり出した満開の桜が咲き誇るさまは見事です。また散り際の桜吹雪も風情があります。西園では早咲きの桜が3月の始め頃から咲き始め、多品種の桜が次々に4月の半ば頃までご観賞いただけます。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-04-10/82841323.jpg","meisyo100":true,"namiki":true,"score":92,"region":"多摩·西部","desc_cn":"吉祥寺旁的人气公园，约400棵樱花倒映井之头池。满开时花瓣飘落水面形成粉色地毯，散落时的樱吹雪也极富风情。名所百选。"},{"id":"4429","name":"新宿中央公園","lat":35.6899,"lon":139.6897,"half":"3月23日","full":"3月26日","fall":"4月1日","trees":"約100本","lightup":true,"desc":"大都会のオアシスである新宿中央公園には、ソメイヨシノはもちろん、新宿区と友好提携を結んでいる長野県高遠町(現在は長野県伊那市)から寄贈されたタカトオコヒガンザクラは濃いピンク色で非常にきれいに咲きます。例年3月下旬～4月上旬頃までご観賞いただけます。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2022-03-20/61366156.jpg","namiki":true,"score":70,"region":"新宿·渋谷"},{"id":"115","name":"靖国神社","lat":35.6945,"lon":139.7438,"half":"3月25日","full":"3月27日","fall":"4月3日","trees":"約500本","lightup":true,"desc":"東京管区気象台が開花を観測するため指定した桜の標本木があり、桜の名所として知られています。桜の見ごろである3月下旬から4月上旬には「奉納芸能」「奉納夜桜能」などの催し物が行われ多くの参拝者でにぎわいます。また、「夜桜詣」では期間限定で神門の扉を開放し、内苑の夜桜をご覧いただけます。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2026-03-19/110013232.jpg","namiki":true,"score":93,"region":"千代田·港","desc_cn":"东京气象厅\"标本木\"所在地——东京的\"开花宣言\"就是看这棵树。约500棵樱花盛开时，参道两旁粉色一片，氛围庄严又浪漫。"},{"id":"4488","name":"ホテル椿山荘東京","lat":35.7125,"lon":139.7254,"half":"3月25日","full":"3月26日","fall":"4月2日","lightup":true,"desc":"ホテル椿山荘東京の桜シーズンは、ひと足早い2月から始まります。早咲きの河津桜から始まり、修繕寺寒桜、おかめ桜、ソメイヨシノなど、開花時期の異なる約20種約100本の桜が順に咲き、4月中旬頃までお楽しみいただけます。ホテル付近に流れる神田川沿いには桜並木があり、庭園と併せて都内有数のお花見スポットにも","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2026-03-01/109181423.jpg","namiki":true,"score":65,"region":"都心·其他"},{"id":"4445","name":"飛鳥山公園","lat":35.7497,"lon":139.739,"half":"3月25日","full":"3月26日","fall":"3月31日","trees":"約600本","lightup":true,"desc":"八代将軍吉宗が江戸庶民の行楽のために桜を植樹し、開放した日本初の公園です。またソメイヨシノのあとにはサトザクラが4月中旬に開花します。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2022-03-27/61543200.jpg","namiki":true,"score":88,"region":"上野·文京","desc_cn":"约600棵樱花的历史名所，从JR王子站有免费小电车直达。有展望台俯瞰樱花全景，交通超方便，适合半日游。"},{"id":"44014","name":"播磨坂","lat":35.7167,"lon":139.7423,"half":"3月24日","full":"3月26日","fall":"4月2日","trees":"約120本","lightup":true,"desc":"ソメイヨシノなど約120本が、例年3月下旬から4月上旬にかけて見頃を迎えます。満開の頃には、桜のトンネルが出現し、美しい景観が広がります。このさくら並木は、昭和35年(1960年)に坂の舗装が行われた際に、当時の花を植える運動の一つとして桜が植栽されたのが始まりで、地元の人々の手で育てられ、今では立","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2025-04-01/95632204.jpg","namiki":true,"score":70,"region":"都心·其他"},{"id":"44001","name":"サンシャインシティの桜","lat":35.7292,"lon":139.7191,"half":"3月26日","full":"3月27日","fall":"4月3日","trees":"8本","lightup":true,"desc":"開花時期が少しずつ異なるソメイヨシノ・エドヒガン・オオシマザクラの3種類の桜をご覧いただけます。隣接する「サンシャインガーデン」「サンシャインビレッジ」には、同時期にチューリップなど春の花々も咲く予定ですので、ぜひ桜と一緒にお楽しみください。なお、「サンシャインビレッジ」はミニチュアハウスの周りを囲","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2023-03-28/71042651.jpg","namiki":true,"score":65,"region":"中野·練馬"},{"id":"4401","name":"洗足池公園","lat":35.6023,"lon":139.6918,"half":"3月25日","full":"3月27日","fall":"4月4日","trees":"200本","lightup":true,"desc":"江戸時代から景勝地として名高く、公園内では歴史遺産から豊かな自然まで、さまざまな魅力に触れられます。園内には約200本の桜があり、池を見下ろす北側の小高い丘には「桜山」「松山」が、西側には通称「しだれ桜山」があり、春には城南の花見名所として多くの人で賑わいます。2025年には、洗足池公園地区が都市景","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2025-04-08/95880820.jpg","namiki":true,"score":73,"region":"都心·其他"},{"id":"4435","name":"明治神宮外苑","lat":35.6771,"lon":139.7179,"half":"3月25日","full":"3月26日","fall":"4月2日","trees":"約310本","lightup":true,"desc":"飲食物(アルコール)の持ち込み、宴会を行うスペースはございません。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2016-04-01/31563768.jpg","namiki":true,"score":71,"region":"新宿·渋谷"},{"id":"44030","name":"石神井川","lat":35.7568,"lon":139.6989,"half":"3月26日","full":"3月27日","fall":"4月3日","trees":"約900本","lightup":true,"desc":"花見の頃になると、中板橋付近から加賀付近まであわせて約900本の桜が咲き誇り、区内を代表する桜の名所となっている。ソメイヨシノを中心に、ヤマザクラ、オオシマザクラなどを楽しむことができる。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2026-03-16/109888930.jpg","namiki":true,"score":81,"region":"中野·練馬"},{"id":"109","name":"小金井公園","lat":35.7171,"lon":139.5178,"half":"3月28日","full":"3月29日","fall":"4月4日","trees":"約1400本","lightup":true,"desc":"園内にはヤマザクラ、サトザクラ、オオシマザクラなど約50種類、約1400本の桜がみられ、隣接する名勝「小金井桜」とともに桜の名所となっています。「桜の園」では多彩な桜が春を彩ります。公園をより快適にご利用いただくために、以下のご協力をお願いいたします。・繁忙期は近隣道路が渋滞し、駐車場が大変混雑いた","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-04-08/82742120.jpg","meisyo100":true,"namiki":true,"score":86,"region":"多摩·西部","desc_cn":"约1400棵50个品种的樱花大公园，有\"樱花园\"专区集中展示。规模壮观，人流比市中心少，是东京本地人的私藏赏樱地。名所百选。"},{"id":"44028","name":"小松川千本桜","lat":35.696,"lon":139.8538,"half":"3月27日","full":"3月28日","fall":"4月4日","trees":"約1000本","lightup":true,"photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2025-04-26/96556696.jpg","namiki":true,"score":78,"region":"都心·其他"},{"id":"112","name":"奥多摩湖","lat":35.7873,"lon":139.0447,"half":"3月29日","full":"3月31日","fall":"4月5日","trees":"約3000本","lightup":true,"desc":"東京の奥座敷で桜三昧！ソメイヨシノやヤマザクラなどがあります。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2023-04-01/71172837.jpg","namiki":true,"score":85,"region":"多摩·西部"},{"id":"4487","name":"Wonderful Nature Village(東京サマーランド)","lat":35.7174,"lon":139.2619,"half":"3月29日","full":"3月31日","fall":"4月7日","trees":"約1000本","lightup":true,"desc":"「わんダフルネイチャーヴィレッジ」では、ソメイヨシノ、シダレザクラをはじめ約1000本の桜が吹き替わりでお楽しみ頂けます。秋川丘陵の自然の中で楽しいひと時をお過ごしください。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2010-04-11/2280373.jpg","namiki":true,"score":79,"region":"多摩·西部"},{"id":"4412","name":"光が丘公園","lat":35.7674,"lon":139.6285,"half":"3月25日","full":"3月29日","fall":"4月3日","trees":"約1000本","lightup":true,"desc":"ソメイヨシノ、オオシマザクラ、ヤマザクラなど、約1000本が園内に点在しています。「芝生広場」でのお花見が人気です。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2017-04-07/36973376.jpg","namiki":true,"score":81,"region":"中野·練馬"},{"id":"44017","name":"舎人公園","lat":35.7969,"lon":139.7686,"half":"3月27日","full":"3月28日","fall":"4月3日","trees":"約1000本","lightup":true,"desc":"「レーガン桜」日本からアメリカに寄贈したソメイヨシノが、レーガン元大統領夫人によって里帰りした、歴史ある桜です。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-04-08/82725750.jpg","namiki":true,"score":79,"region":"上野·文京"},{"id":"107","name":"新宿御苑","lat":35.6852,"lon":139.71,"half":"3月31日","full":"4月2日","fall":"4月8日","trees":"約900本","lightup":true,"desc":"約70品種約900本のサクラがあり、2月～4月中旬まで、長期にわたって園内を鮮やかに彩ります。艶やかに咲き競う個性豊かな桜をご観賞ください。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2026-03-19/110015164.jpg","meisyo100":true,"namiki":true,"score":96,"region":"新宿·渋谷","desc_cn":"约900棵、70个品种的樱花乐园，花期从2月一直延续到4月下旬。适合慢逛和野餐，是东京最佳摄影赏樱地之一。禁止饮酒，氛围特别安静舒适。"},{"id":"118","name":"隅田公園","lat":35.7161,"lon":139.8033,"half":"3月28日","full":"3月30日","fall":"4月5日","trees":"約400本","lightup":true,"photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2025-04-09/95966306.jpg","meisyo100":true,"namiki":true,"score":91,"region":"上野·文京","desc_cn":"约600棵樱花沿隅田川两岸绵延，远处晴空塔作为背景——这就是小红书和ins上最经典的\"樱花+晴空塔\"构图地。"},{"id":"4421","name":"武蔵野公園","lat":35.6879,"lon":139.5205,"half":"3月29日","full":"3月31日","fall":"4月4日","trees":"約600本","lightup":true,"desc":"約40種の多品種の桜が3月上旬〜4月下旬まで次々と開花します。長期間お花見を楽しめるのがポイント。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2025-04-21/96404166.jpg","namiki":true,"score":75,"region":"多摩·西部"},{"id":"44012","name":"塩田耕地堤","lat":35.7393,"lon":139.2597,"half":"3月31日","full":"4月1日","fall":"4月7日","trees":"約100本","lightup":true,"desc":"ひので桜ライトアップ事業（開催予定）18本の桜と対岸にある竹林の一部にライトアップを行うことで、桜の淡いピンク色と竹の鮮やかな緑色が効果的に美しく融合し幻想的な空間を演出。さらに豊かな自然環境と調和した「環境にやさしく、美しい景観」を演出する。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2022-04-10/61898297.jpg","namiki":true,"score":70,"region":"多摩·西部"},{"id":"44069","name":"等々力不動尊","lat":35.6038,"lon":139.6472,"half":"3月26日","full":"3月28日","fall":"4月3日","trees":"約100本","lightup":true,"namiki":true,"score":65,"region":"都心·其他"},{"id":"44018","name":"水元公園","lat":35.7937,"lon":139.8696,"half":"3月27日","full":"3月29日","fall":"4月4日","lightup":true,"desc":"園内に点在するサクラと共に、広大な中央広場、水辺の景色など様々な風景を楽しむことが出来ます。また、水元公園西側の葛飾区遊歩道（通称さくら堤）には約3.5㎞にわたって約530本のソメイヨシノを主としたサクラが咲き誇ります。","photo":"https://smtgvs.cdn.weathernews.jp/smart/report/image/2024-04-13/82940182.jpg","namiki":true,"score":65,"region":"上野·文京"},{"id":"4420","name":"旧古河庭園","lat":35.7427,"lon":139.7463,"half":"3月28日","full":"3月29日","fall":"4月5日","trees":"11本","lightup":tr // === SCORING: 景点推荐度（最美时候有多值得去）===
function calcScore(s){
  var sc=50; // base
  // 1) 规模 — 树的数量
  var treeNum=0;
  if(s.trees){var m=s.trees.match(/(\d+)/);if(m)treeNum=parseInt(m[1])}
  if(treeNum>=3000) sc+=25;
  else if(treeNum>=1500) sc+=22;
  else if(treeNum>=1000) sc+=20;
  else if(treeNum>=500) sc+=15;
  else if(treeNum>=200) sc+=10;
  else if(treeNum>=100) sc+=6;
  else if(treeNum>=30) sc+=3;
  // 2) 名所100选
  if(s.meisyo100) sc+=15;
  // 3) 夜樱灯光
  if(s.lightup) sc+=5;
  // 4) 樱花并木道
  if(s.namiki) sc+=3;
  // 5) 有实景照片
  if(s.photo) sc+=3;
  // 6) 有详细描述（信息丰富）
  if(s.desc&&s.desc.length>50) sc+=4;
  else if(s.desc&&s.desc.length>0) sc+=2;
  // 7) 花期窗口长（fall - half 天数越长越好）
  if(s.half&&s.fall){
    var hm=s.half.match(/(\d+)月(\d+)日/),fm=s.fall.match(/(\d+)月(\d+)日/);
    if(hm&&fm){
      var span=Math.round((new Date(2026,parseInt(fm[1])-1,parseInt(fm[2]))-new Date(2026,parseInt(hm[1])-1,parseInt(hm[2])))/864e5);
      if(span>=10) sc+=5;
      else if(span>=7) sc+=3;
    }
  }
  return Math.min(100,sc);
}
for(var k in RAW){
  RAW[k].forEach(function(s){s.score=calcScore(s)});
  RAW[k].sort(function(a,b){return(b.score||0)-(a.score||0)});
}

function getColor(s){
  // Use actual dates for comparison, not pct
  function toDay(str){if(!str)return null;var m=str.match(/(\d+)月(\d+)日/);if(!m)return null;return new Date(2026,parseInt(m[1])-1,parseInt(m[2]))}
  var now=TODAY.getTime();
  var halfD=toDay(s.half),fullD=toDay(s.full),fallD=toDay(s.fall);
  var halfT=halfD?halfD.getTime():null, fullT=fullD?fullD.getTime():null, fallT=fallD?fallD.getTime():null;

  if(fallT&&now>fallT) return'#9c27b0';           // 紫色 = 飘落中
  if(fullT&&now>=fullT) return'#c2185b';           // 深粉红 = 满开最佳
  if(halfT&&now>=halfT) return'#e91e63';           // 粉红 = 开花中(半开~满开之间)
  if(halfT&&now>=halfT-3*864e5) return'#f48fb1';   // 浅粉 = 3天内即将开花
  if(halfT&&now>=halfT-7*864e5) return'#f8bbd0';   // 更浅粉 = 7天内开花
  return'#81c784';                                  // 绿色 = 花苞期
}

  if(spots.length>0){
    selectSpot(ci,0);
  } else {
    document.getElementById('rp-empty').style.display='flex';
    document.getElementById('dc').className='dc';
  }
  renderTL();
}

function loadMapCity(ci){
  var city=CITIES[ci];
  // Clear old markers & labels
  mapMarkers.forEach(function(m){map.removeLayer(m)});
  mapLabels.forEach(function(l){map.removeLayer(l)});
  mapMarkers=[];
  mapLabels=[];

  map.setView(city.center,city.zoom,{animate:false});

  var spots=RAW[city.key]||[];
  spots.forEach(function(s,si){
    if(!s.lat||!s.lon)return;
    var col=getColor(s);

    // Circle marker — all spots get a marker
    var cm=L.circleMarker([s.lat,s.lon],{
      radius:7,fillColor:col,fillOpacity:0.8,color:'#fff',weight:1.5
    });
    cm.on('click',function(){selectSpot(ci,si)});
    // Hover popup for ALL spots (not just labeled ones)
    cm.bindPopup('<b>'+(s.name||'')+'</b><br>满开: '+fmtS(s.full||'?'),{closeButton:false,offset:[0,-4]});
    cm.on('mouseover',function(){this.openPopup()});
    cm.on('mouseout',function(){this.closePopup()});
    cm.addTo(map);
    mapMarkers.push(cm);

    // Permanent text label only for Top 6 (avoid clutter & overlap)
    if(si<6){
      var name=(s.name||'').substring(0,8);
      var dateStr=s.full?fmtS(s.full):'';
      var labelHtml='<div class="sl-name">'+name+'</div><div class="sl-date">满开 '+dateStr;
      if(s.score>=90) labelHtml+=' <span class="sl-score">'+s.score+'</span>';
      labelHtml+='</div>';

      var tooltip=L.tooltip({
        permanent:true,
        direction:si%2===0?'right':'left',
        offset:si%2===0?[10,0]:[-10,0],
        className:'spot-label',
        interactive:true
      }).setContent(labelHtml).setLatLng([s.lat,s.lon]);
      tooltip.addTo(map);
      tooltip.getElement().onclick=function(){selectSpot(ci,si)};
      mapLabels.push(tooltip);
    }
  });

  // === Add landmark markers ===
  var lmks=LANDMARKS[city.key]||[];
  lmks.forEach(function(lm){
    var icon=L.divIcon({
      className:'lmk-icon',
      html:'<div class="lmk-inner"><span class="lmk-emoji">'+lm.emoji+'</span><span class="lmk-name">'+lm.name+'</span></div>',
      iconSize:[50,36],
      iconAnchor:[25,36]
    });
    var mk=L.marker([lm.lat,lm.lon],{icon:icon,interactive:false});
    mk.addTo(map);
    mapMarkers.push(mk);
  });
}

function loadLeftPanel(ci){
  var city=CITIES[ci];
  var spots=RAW[city.key]||[];
  document.getElementById('lp-hdr').innerHTML='<span class="lph-emoji">'+city.emoji+'</span>'+city.name+' TOP '+Math.min(spots.length,20)+'<span class="lph-status">'+city.status+'</span>';

  var html='';
  var show=Math.min(spots.length,20);
  for(var i=0;i<show;i++){
    var s=spots[i];
    var rc=i<1?'r1':i<2?'r2':i<3?'r3':'rn';
    var dn=daysTo(s.full);
    var dnStr=dn!==null?(dn>0?dn+'天后':dn===0?'今天!':'已过'+Math.abs(dn)+'天'):'';

    var bar='<div class="lp-mini">';
    if(s.half)bar+='<div class="mf mbm" style="left:'+pct(s.half)+'%;width:'+Math.max(1,pct(s.full||s.half)-pct(s.half))+'%"></div>';
    if(s.full)bar+='<div class="mf mbb" style="left:'+pct(s.full)+'%;width:'+Math.max(1,(pct(s.fall||s.full)-pct(s.full)))+'%"></div>';
    if(s.fall)bar+='<div class="mf mbf" style="left:'+pct(s.fall)+'%;width:'+Math.min(8,100-pct(s.fall))+'%"></div>';
    bar+='<div class="td" style="left:'+todayPct+'%"></div></div>';

    html+='<div class="lp-item" data-si="'+i+'" onclick="selectSpot('+ci+','+i+')">';
    html+='<span class="lp-rank '+rc+'">'+(i+1)+'</span><span class="lp-name">'+(s.name||'景点').substring(0,10)+'</span>';
    html+='<div class="lp-sub"><b>满开 '+fmtS(s.full||'?')+'</b> '+dnStr+'</div>';
    html+=bar;
    html+='</div>';
  }
  document.getElementById('lp-list').innerHTML=html;
}

function selectSpot(ci,si){
  if(ci!==curCity) switchCity(ci);
  var spots=RAW[CITIES[ci].key]||[];
  var s=spots[si];
  if(!s)return;

  // Highlight left
  document.querySelectorAll('.lp-item').forEach(function(el){
    el.classList.toggle('active',parseInt(el.getAttribute('data-si'))===si);
  });

  // NO panTo — keep map fixed, don't move on spot click

  // Open popup
  if(mapMarkers[si]) mapMarkers[si].openPopup();

  // Right panel detail
  document.getElementById('rp-empty').style.display='none';
  var dc=document.getElementById('dc');
  dc.className='dc visible';

  var imgH=s.photo?'<img class="dc-img" src="'+s.photo+'" onerror="this.style.display=\'none\'"/>':'<div class="dc-img-ph">🌸</div>';

  var dn=daysTo(s.full);
  // 推荐理由 — 基于景点综合实力
  var reasons=[];
  var treeNum=0;
  if(s.trees){var tm=s.trees.match(/(\d+)/);if(tm)treeNum=parseInt(tm[1])}
  if(s.meisyo100) reasons.push('🏆 日本樱花名所100选');
  if(treeNum>=1000) reasons.push('🌳 '+s.trees+'樱花树，规模壮观');
  else if(treeNum>=500) reasons.push('🌳 '+s.trees+'樱花树');
  if(s.lightup) reasons.push('🌙 有夜樱灯光');
  if(s.half&&s.fall){
    var hm2=s.half.match(/(\d+)月(\d+)日/),fm2=s.fall.match(/(\d+)月(\d+)日/);
    if(hm2&&fm2){var sp=Math.round((new Date(2026,parseInt(fm2[1])-1,parseInt(fm2[2]))-new Date(2026,parseInt(hm2[1])-1,parseInt(hm2[2])))/864e5);if(sp>=10)reasons.push('🗓 花期长达'+sp+'天')}
  }
  var reason=reasons.length>0?reasons.slice(0,3).join(' · '):'樱花名所';

  var dates='<div class="dc-dates">';
  if(s.half)dates+='<div class="dc-dr"><div class="dc-dr-dot" style="background:#f48fb1"></div><div class="dc-dr-label">半开</div><div class="dc-dr-val">'+fmtS(s.half)+'</div><div class="dc-dr-days">'+(daysTo(s.half)>0?daysTo(s.half)+'天后':'已到')+'</div></div>';
  if(s.full)dates+='<div class="dc-dr"><div class="dc-dr-dot" style="background:#e91e63"></div><div class="dc-dr-label">满开</div><div class="dc-dr-val" style="color:#c2185b">'+fmtS(s.full)+'</div><div class="dc-dr-days">'+(dn>0?dn+'天后':dn===0?'🎉 今天':'已过'+Math.abs(dn)+'天')+'</div></div>';
  if(s.fall)dates+='<div class="dc-dr"><div class="dc-dr-dot" style="background:#ab47bc"></div><div class="dc-dr-label">飘落</div><div class="dc-dr-val">'+fmtS(s.fall)+'</div><div class="dc-dr-days">'+(daysTo(s.fall)>0?daysTo(s.fall)+'天后':'已开始')+'</div></div>';
  dates+='</div>';

  var bar='<div class="dc-bar">';
  if(s.half)bar+='<div class="bf mbm" style="left:'+pct(s.half)+'%;width:'+Math.max(1,pct(s.full||s.half)-pct(s.half))+'%"></div>';
  if(s.full)bar+='<div class="bf mbb" style="left:'+pct(s.full)+'%;width:'+Math.max(1,(pct(s.fall||s.full)-pct(s.full)))+'%"></div>';
  if(s.fall)bar+='<div class="bf mbf" style="left:'+pct(s.fall)+'%;width:8%"></div>';
  bar+='<div class="td" style="left:'+todayPct+'%"></div></div>';

  var tags='<div class="dc-tags">';
  if(s.meisyo100)tags+='<span class="dct dct-meisyo">🏆 名所100选</span>';
  if(s.lightup)tags+='<span class="dct dct-night">🌙 夜樱灯光</span>';
  if(s.trees)tags+='<span class="dct dct-trees">🌳 '+s.trees+'</span>';
  if(s.namiki)tags+='<span class="dct dct-namiki">🌸 樱花隧道</span>';
  tags+='</div>';

  var evtH='';
  if(s.event)evtH='<div class="dc-event"><b>🎌 活动信息</b>'+s.event+'</div>';

  dc.innerHTML=imgH+'<div class="dc-body"><div class="dc-name">'+(s.name||'景点')+'</div><div class="dc-addr">'+(s.addr||'')+'</div><div class="dc-score-box"><div class="dc-score-num">'+(s.score||'--')+'</div><div><div class="dc-score-label">推荐指数</div><div class="dc-score-reason">'+reason+'</div></div></div>'+dates+bar+tags+(s.desc?'<div class="dc-desc">'+s.desc+'</div>':'')+evtH+'</div>';
}

// === TIMELINE PAGE — Full screen card style, grouped by region ===
var tlCurCity=0;
function renderTL(){
  var wrap=document.getElementById('tl-wrap');

  // City nav
  var html='<div class="tl-city-nav">';
  CITIES.forEach(function(c,ci){
    html+='<div class="tl-cn-btn'+(ci===tlCurCity?' active':'')+'" onclick="tlSwitchCity('+ci+')">'+c.emoji+' '+c.name+'</div>';
  });
  html+='</div>';

  // Legend
  html+='<div class="tl-legend"><div class="tli"><div class="tlb" style="background:linear-gradient(90deg,#f8b4c8,#f48fb1)"></div>开花~半开</div><div class="tli"><div class="tlb" style="background:linear-gradient(90deg,#e91e63,#c2185b)"></div>满开(最佳)</div><div class="tli"><div class="tlb" style="background:linear-gradient(90deg,#ce93d8,#ab47bc)"></div>飘落</div><div class="tli"><div style="width:2px;height:8px;background:#333;border-radius:1px"></div>今天</div></div>';

  var c=CITIES[tlCurCity];
  var spots=(RAW[c.key]||[]).slice();
  spots.sort(function(a,b){return(b.score||0)-(a.score||0)});

  // Group by region
  var regionMap={};
  var regionOrder=[];
  spots.forEach(function(s){
    var r=s.region||'其他';
    if(!regionMap[r]){regionMap[r]=[];regionOrder.push(r)}
    regionMap[r].push(s);
  });

  regionOrder.forEach(function(region){
    var rSpots=regionMap[region];
    html+='<div class="tl-region">';
    html+='<div class="tl-region-hdr">📍 '+region+'<span class="trh-count">'+rSpots.length+'个景点</span></div>';
    html+='<div class="tl-cards">';

    rSpots.forEach(function(s){
      var imgH=s.photo?'<img class="tl-card-img" src="'+s.photo+'" onerror="this.outerHTML=\'<div class=tl-card-img-ph>🌸</div>\'"/>':'<div class="tl-card-img-ph">🌸</div>';

      // Tags
      var tags='<div class="tl-card-tags">';
      if(s.meisyo100)tags+='<span style="background:#fff3e0;color:#e65100">🏆 百选</span>';
      if(s.lightup)tags+='<span style="background:#f3e5f5;color:#8e24aa">🌙 夜樱</span>';
      if(s.trees)tags+='<span style="background:#e8f5e9;color:#2e7d32">🌳 '+s.trees+'</span>';
      if(s.namiki)tags+='<span style="background:#e3f2fd;color:#1565c0">🌸 樱花道</span>';
      tags+='</div>';

      // Dates
      var dates='<div class="tl-card-dates">';
      if(s.half)dates+='<div class="tcd"><div class="tcd-dot" style="background:#f48fb1"></div>半开 '+fmtS(s.half)+'</div>';
      if(s.full)dates+='<div class="tcd"><div class="tcd-dot" style="background:#e91e63"></div><b>满开 '+fmtS(s.full)+'</b></div>';
      if(s.fall)dates+='<div class="tcd"><div class="tcd-dot" style="background:#ab47bc"></div>飘落 '+fmtS(s.fall)+'</div>';
      dates+='</div>';

      // Bar
      var bar='<div class="tl-card-bar">';
      if(s.half)bar+='<div class="bf mbm" style="left:'+pct(s.half)+'%;width:'+Math.max(1,pct(s.full||s.half)-pct(s.half))+'%"></div>';
      if(s.full)bar+='<div class="bf mbb" style="left:'+pct(s.full)+'%;width:'+Math.max(1,(pct(s.fall||s.full)-pct(s.full)))+'%"></div>';
      if(s.fall)bar+='<div class="bf mbf" style="left:'+pct(s.fall)+'%;width:'+Math.min(8,100-pct(s.fall))+'%"></div>';
      bar+='<div class="td" style="left:'+todayPct+'%"></div></div>';

      // Description — prefer Chinese, fallback to Japanese
      var desc=s.desc_cn||s.desc||'';
      if(desc.length>80) desc=desc.substring(0,80)+'...';

      html+='<div class="tl-card" onclick="showPage(\'map\');switchCity('+CITIES.indexOf(c)+');var idx=RAW[\''+c.key+'\'].indexOf(arguments[0]);selectSpot('+CITIES.indexOf(c)+',RAW[\''+c.key+'\'].findIndex(function(x){return x.id===\''+s.id+'\'}))">';
      html+='<div class="tl-card-top">';
      html+=imgH;
      html+='<div class="tl-card-info">';
      html+='<div style="display:flex;align-items:center;gap:6px"><div class="tl-card-name">'+(s.name||'景点')+'</div><div class="tl-card-score">'+s.score+'</div></div>';
      html+='<div class="tl-card-meta"><span>满开 '+fmtS(s.full||'?')+'</span>';
      var dn=daysTo(s.full);
      if(dn!==null){
        if(dn>0)html+='<span style="color:#e91e63;font-weight:600">'+dn+'天后</span>';
        else if(dn===0)html+='<span style="color:#e91e63;font-weight:700">🎉 今天!</span>';
        else html+='<span style="color:#9c27b0">已过'+Math.abs(dn)+'天</span>';
      }
      html+='</div>';
      html+=tags;
      html+=dates;
      html+='</div></div>';
      html+='<div class="tl-card-bottom">'+bar;
      if(desc)html+='<div class="tl-card-desc">'+desc+'</div>';
      html+='</div></div>';
    });

    html+='</div></div>';
  });

  wrap.innerHTML=html;
}

function tlSwitchCity(ci){
  tlCurCity=ci;
  renderTL();
}

// View toggle
function showPage(v){
  document.querySelectorAll('.ht-btn').forEach(function(b){b.classList.remove('active')});
  if(v==='map'){
    document.getElementById('map-page').className='page active';
    document.getElementById('tl-page').className='page';
    document.querySelectorAll('.ht-btn')[0].classList.add('active');
    setTimeout(function(){map.invalidateSize()},100);
  }else{
    document.getElementById('map-page').className='page';
    document.getElementById('tl-page').className='page active';
    document.querySelectorAll('.ht-btn')[1].classList.add('active');
  }
}

// Init
switchCity(0);
renderTL();
setTimeout(function(){map.invalidateSize()},300);
</script>
