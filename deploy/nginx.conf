upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream web_frontend {
    server frontend:3000;
    keepalive 16;
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name kiwitrip.cn www.kiwitrip.cn 47.242.209.129;

    # Let's Encrypt 验证路径直接放行
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name kiwitrip.cn www.kiwitrip.cn 47.242.209.129;

    # SSL 证书（certbot 申请后自动替换）
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # 后端 FastAPI 路由（直接路径，无 /api 前缀）
    location ~ ^/(trips|orders|submissions|products|pois|cities|ops|chat|quiz|config|detail-forms|destinations|attribution|admin/reviews|admin/sync) {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # AI 运维助手
    location /ops-ai/ {
        proxy_pass         http://ai-ops:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Health check 直接透传
    location /health {
        proxy_pass http://api_backend/health;
    }

    # 前端 Next.js（包括 /api/* 前端路由）
    location / {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
