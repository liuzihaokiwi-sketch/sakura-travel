services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: japan_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: japan_ai_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - backend

  api:
    image: ${DOCKER_IMAGE:-japan_ai_api}:${IMAGE_TAG:-latest}
    container_name: japan_ai_api
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - exports_data:/app/exports
      - ./data:/app/data:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${DOCKER_IMAGE:-japan_ai_api}:${IMAGE_TAG:-latest}
    container_name: japan_ai_worker
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - exports_data:/app/exports
      - ./data:/app/data:ro
    command: python -m app.workers
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: japan_ai_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:
  exports_data:
  nginx_logs:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
