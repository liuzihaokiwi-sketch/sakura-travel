  duration_days: 5
  party_type: couple
  party_size: 2
  party_ages: [26, 24]
  budget_level: budget
  budget_total_jpy: 60000
  pace_preference: moderate
  trip_style: one_city
  stamina_level: mid
  must_have_tags: [michelin_restaurant, teamlab, shibuya_crossing]
  food_preferences: [omakase, wagyu]
