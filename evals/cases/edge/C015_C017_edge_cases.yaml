case_id: C016
case_type: edge
title: 东京5天预算冲突 — 奢华偏好 vs 性价比预算
description: 测试偏好-预算冲突处理：用户标注 budget=budget 但 must_have 包含米其林餐厅，系统应明确提示冲突并给出折衷建议
