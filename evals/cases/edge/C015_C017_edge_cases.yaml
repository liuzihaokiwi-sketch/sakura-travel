# ══════════════════════════════════════════════════════════════════
# Case 17 — 信息不全已付费 5 天  (D类：边界)
# ══════════════════════════════════════════════════════════════════
case_id: C017
case_type: edge
title: 东京5天信息不全 — 缺到离时间和酒店区域
description: 测试信息残缺时的优雅降级：arrival_time 和 departure_time 均为空，accommodation_pref 未填，系统应给出假设说明并生成合理行程
tags: [tokyo, couple, mid_budget, incomplete_info, edge]
known_risks:
  - 到离时间缺失导致首末日安排无法精确
  - 系统应使用 fallback 假设（默认到达 14:00，默认离开 10:00）

user_input:
  cities:
    - {city_code: tokyo, city_name: 东京, nights: 5, place_id: JP-TOKYO}
  travel_start_date: "2026-06-01"
  travel_end_date: "2026-06-06"
  duration_days: 5
  party_type: couple
  party_size: 2
  party_ages: [28, 26]
  budget_level: mid
  pace_preference: moderate
  trip_style: one_city
  stamina_level: mid
  # 故意缺失：arrival_time, departure_time, accommodation_pref
  arrival_date: "2026-06-01"
  arrival_place: NRT
  departure_date: "2026-06-06"
  departure_place: NRT
  has_jr_pass: false
  japan_experience: first_time

normalized_profile_expected:
  city_codes: [tokyo]
  trip_style: one_city
  theme_family: classic_first
  budget_level: mid
  party_type: couple

output_requirements:
  min_days_covered: 4
  must_include_sections: [overview, day1, transport_guide]
  must_mention_keywords: [假设, 默认, 请确认]
  incomplete_info_flag: true
  fallback_acceptable: true
  version: standard
