case_id: R001
case_type: regression
title: 回归：首末日时间逻辑（历史bug：到达日排了凌晨景点）
description: |
  历史 bug：当用户到达时间为 14:00 时，生成器曾推荐上午 9:00 的景点（时间轴错误）。
  此用例固化为回归测试，确保该 bug 不再出现。
tags: [regression, timing_bug, tokyo]
known_risks: [历史上到达当天曾推荐到达前的景点]
user_input:
  cities: [{city_code: tokyo, city_name: 东京, nights: 7, place_id: JP-TOKYO}]
  duration_days: 7
  party_type: couple
  party_size: 2
  budget_level: mid
  arrival_date: "2026-04-01"
  arrival_time: "14:00"
  arrival_place: NRT
  departure_date: "2026-04-08"
  departure_time: "09:00"
  departure_place: NRT
hard_constraints_expected:
  should_pass: [day1_start_after_arrival, last_day_ends_before_departure]
output_requirements:
  must_not_mention_keywords: ["Day1 09:00", "Day1 10:00", "Day1 11:00", "Day1 12:00", "Day1 13:00"]
grader_overrides:
  planning_rubric:
    P3_weight: 50
    pass_threshold: 90

