---
case_id: R003
case_type: regression
title: 回归：多城顺路性错误（大阪→广岛→京都→大阪 绕路）
description: |
  历史 bug：关西多城行程曾出现大阪→广岛→京都→大阪的绕路安排，
  正确顺序应为大阪→京都→广岛（或广岛→京都→大阪）。
tags: [regression, routing_bug, osaka, kyoto, hiroshima]
user_input:
  cities:
    - {city_code: osaka, city_name: 大阪, nights: 3, place_id: JP-OSAKA}
    - {city_code: kyoto, city_name: 京都, nights: 2, place_id: JP-KYOTO}
    - {city_code: hiroshima, city_name: 广岛, nights: 2, place_id: JP-HIROSHIMA}
  duration_days: 7
  party_type: friends
  party_size: 3
  budget_level: mid
  trip_style: multi_city
  arrival_date: "2026-09-01"
  arrival_time: "10:00"
  arrival_place: KIX
  departure_date: "2026-09-08"
  departure_time: "14:00"
  departure_place: HIJ
  has_jr_pass: true
  jr_pass_type: 7day
hard_constraints_expected:
  should_pass: [no_backtrack_routing]
output_requirements:
  must_not_mention_keywords: [大阪→广岛→京都]
grader_overrides:
  planning_rubric:
    P1_weight: 50
    pass_threshold: 90
