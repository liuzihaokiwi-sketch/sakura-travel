  cities:
    - {city_code: kyoto, city_name: 京都, nights: 4, place_id: JP-KYOTO}
    - {city_code: osaka, city_name: 大阪, nights: 4, place_id: JP-OSAKA}
    - {city_code: kobe, city_name: 神户, nights: 2, place_id: JP-KOBE}
  travel_start_date: "2026-05-01"
  travel_end_date: "2026-05-11"
  duration_days: 10
  party_type: friends
  party_size: 4
  party_ages: [24, 25, 23, 26]
  budget_level: budget
  budget_total_jpy: 80000
  pace_preference: moderate
  trip_style: multi_city
  stamina_level: high
  must_have_tags: [fushimi_inari, dotonbori, nishiki_market]
  food_preferences: [ramen, takoyaki, street_food]
  arrival_date: "2026-05-01"
  arrival_time: "10:30"
  arrival_place: KIX
  departure_date: "2026-05-11"
  departure_time: "13:00"
  departure_place: KIX
  transport_locked: false
  has_jr_pass: false
  japan_experience: first_time

normalized_profile_expected:
