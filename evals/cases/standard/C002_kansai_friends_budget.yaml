case_id: C002
case_type: standard
title: 京阪神10天多城 — 朋友团性价比
description: 4人朋友团，京都+大阪+神户10天，预算偏低，第一次日本，多城顺游
tags: [kyoto, osaka, kobe, friends, budget, first_time, multi_city]
known_risks:
  - 多城行程顺路性检查
  - budget 用户不应推荐高价餐厅

