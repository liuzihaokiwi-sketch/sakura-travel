services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: japan_ai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-japan_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-japan_ai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-japan_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-japan_ai} -d ${POSTGRES_DB:-japan_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: japan_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japan_ai_api
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-japan_ai}:${POSTGRES_PASSWORD:-japan_ai_dev}@postgres:5432/${POSTGRES_DB:-japan_ai}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japan_ai_worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-japan_ai}:${POSTGRES_PASSWORD:-japan_ai_dev}@postgres:5432/${POSTGRES_DB:-japan_ai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - exports_data:/app/exports
    command: python -m app.workers

  frontend:
    image: node:20-alpine
    container_name: travel-web
    environment:
      - BACKEND_URL=http://api:8000
      - NEXT_PUBLIC_BACKEND_URL=http://api:8000
    volumes:
      - ./web:/app
    depends_on:
      - api
    command: sh -c "cd /app && node .next/standalone/server.js"

  nginx:
    image: nginx:alpine
    container_name: japan_ai_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/ssl:/etc/nginx/ssl
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - api
      - frontend
      - ai-ops

  ai-ops:
    build:
      context: .
      dockerfile: deploy/ai-ops/Dockerfile
    container_name: ai_ops_agent
    env_file:
      - .env
    environment:
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - AI_OPS_MODEL=${AI_OPS_MODEL:-claude-sonnet-4-20250514}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/ai-ops:/app/ai-ops
      - .:/opt/travel-ai
    working_dir: /opt/travel-ai
    command: python deploy/ai-ops/server.py
    restart: always
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  exports_data:
